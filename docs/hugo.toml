baseURL = "https://stlimtat.github.io/kumokagi/"
copyright = "Copyright © 2026 Swee Tat Lim — MIT License"
title = "kumokagi"
enableRobotsTXT = true

[build]
  noJSConfigInAssets = true
  [build.buildStats]
    # Required by PurgeCSS to prune unused CSS in production builds.
    enable = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      # Required by Prism plugins.
      unsafe = true

[outputs]
  home = ["html", "rss", "searchIndex"]

[outputFormats]
  [outputFormats.searchIndex]
    mediaType = "application/json"
    baseName = "search-index"
    isPlainText = true
    notAlternative = true

[params]
  defaultTheme = "dark"
  # gray red green yellow blue purple aqua orange
  themeColor = "blue"
  themeContrast = "medium"
  author = "Swee Tat Lim"
  subtitle = "雲鍵 — one identity, any cloud"
  description = "Ephemeral secrets management for Go and Python. Fetch secrets at runtime from Vault, AWS, Azure, GCP, or 1Password without ever writing them to disk, environment variables, or container manifests."

  [params.logo]
    text = "kumokagi 雲鍵"
    url = "/"

  [params.prism]
    languages = [
      "markup",
      "css",
      "clike",
      "javascript",
      "bash",
      "go",
      "python",
      "yaml",
      "json",
      "toml",
      "hcl",
    ]
    plugins = [
      "normalize-whitespace",
      "toolbar",
      "copy-to-clipboard",
      "command-line",
    ]

  [params.tagCloud]
    enable = false

[menu]
  [[menu.main]]
    identifier = "introduction"
    name = "Introduction"
    url = "/introduction"
    weight = 10
  [[menu.main]]
    identifier = "quickstart"
    name = "Quickstart"
    url = "/quickstart"
    weight = 20
  [[menu.main]]
    identifier = "how-to"
    name = "How-To"
    url = "/how-to"
    weight = 30
  [[menu.main]]
    identifier = "architecture"
    name = "Architecture"
    url = "/architecture"
    weight = 40
  [[menu.main]]
    identifier = "adrs"
    name = "ADRs"
    url = "/adrs"
    weight = 50
  [[menu.main]]
    identifier = "contributing"
    name = "Contributing"
    url = "/contributing"
    weight = 60
  [[menu.main]]
    identifier = "license"
    name = "License"
    url = "/license"
    weight = 70

[languages]
  [languages.en]
    label = "English"
    weight = 10
    [languages.en.params.jsonResume]
      present = "present"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.128.0"
  [[module.imports]]
    path = "github.com/schnerring/hugo-theme-gruvbox"
  [[module.imports]]
    path = "github.com/schnerring/hugo-mod-json-resume"
    [[module.imports.mounts]]
      source = "data"
      target = "data"
    [[module.imports.mounts]]
      source = "layouts"
      target = "layouts"
    [[module.imports.mounts]]
      source = "assets/css/json-resume.css"
      target = "assets/css/critical/44-json-resume.css"
  [[module.mounts]]
    # required by hugo-mod-json-resume
    source = "node_modules/simple-icons/icons"
    target = "assets/simple-icons"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "node_modules/prismjs"
    target = "assets/prismjs"
  [[module.mounts]]
    source = "node_modules/prism-themes/themes"
    target = "assets/prism-themes"
  [[module.mounts]]
    source = "node_modules/typeface-fira-code/files"
    target = "static/fonts"
  [[module.mounts]]
    source = "node_modules/typeface-roboto-slab/files"
    target = "static/fonts"
  [[module.mounts]]
    source = "node_modules/@tabler/icons/icons"
    target = "assets/tabler-icons"
  [[module.mounts]]
    # Add hugo_stats.json to Hugo's server watcher.
    source = "hugo_stats.json"
    target = "assets/watching/hugo_stats.json"
